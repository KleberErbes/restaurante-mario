<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Restaurante do Mário</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <script type="module">
    import { Document, Packer, Paragraph, TextRun } from 'https://esm.sh/docx@8.5.0';
    window.docxLib = { Document, Packer, Paragraph, TextRun };
  </script>
  <style>
    :root {
      --verde: #1a4a14;
      --verde-claro: #2e7d20;
      --dourado: #c9a84c;
      --bg: #f5f5f0;
      --card-bg: #ffffff;
      --texto: #1a1a1a;
      --cinza: #666;
      --borda: #e0e0d8;
      --separador: #ddd;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Lato', sans-serif; background: var(--bg); color: var(--texto); min-height: 100vh; }

    /* ===== LOGIN ===== */
    #telaLogin {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: var(--verde);
    }
    .login-box {
      background: #fff; border-radius: 20px; padding: 48px 40px;
      width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    .login-logo {
      font-family: 'Playfair Display', serif; font-size: 1.6rem;
      font-weight: 900; color: var(--verde); margin-bottom: 6px;
    }
    .login-sub { font-size: 0.82rem; color: var(--cinza); margin-bottom: 32px; letter-spacing: 1px; }
    .login-box input {
      width: 100%; padding: 13px 16px; border: 2px solid var(--borda);
      border-radius: 10px; font-size: 1rem; font-family: 'Lato', sans-serif;
      margin-bottom: 14px; outline: none; transition: border 0.2s;
    }
    .login-box input:focus { border-color: var(--verde-claro); }
    .login-btn {
      width: 100%; padding: 14px; background: var(--verde); color: #fff;
      border: none; border-radius: 10px; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: background 0.2s; font-family: 'Lato', sans-serif;
    }
    .login-btn:hover { background: var(--verde-claro); }
    .login-erro { color: #c0392b; font-size: 0.88rem; margin-top: 10px; min-height: 20px; }

    /* ===== PAINEL ADMIN ===== */
    #telaAdmin { display: none; }
    .admin-header {
      background: var(--verde); color: #fff; padding: 0 32px;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }
    .admin-header-title {
      font-family: 'Playfair Display', serif; font-size: 1.25rem;
      font-weight: 900; color: #fff;
    }
    .admin-header-right { display: flex; align-items: center; gap: 16px; }
    .badge-total {
      background: var(--dourado); color: #fff; border-radius: 20px;
      padding: 4px 14px; font-size: 0.82rem; font-weight: 700;
    }
    .btn-imprimir {
      background: var(--dourado); color: #fff; border: none;
      border-radius: 10px; padding: 9px 20px; font-size: 0.9rem;
      font-weight: 700; cursor: pointer; font-family: 'Lato', sans-serif;
      transition: background 0.2s;
    }
    .btn-imprimir:hover { background: #b8922e; }
    .btn-sair {
      background: rgba(255,255,255,0.15); color: #fff; border: none;
      border-radius: 10px; padding: 9px 16px; font-size: 0.85rem;
      cursor: pointer; font-family: 'Lato', sans-serif; transition: background 0.2s;
    }
    .btn-sair:hover { background: rgba(255,255,255,0.25); }

    .admin-body { max-width: 860px; margin: 0 auto; padding: 32px 24px 64px; }

    .admin-info-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; flex-wrap: wrap; gap: 10px;
    }
    .admin-info-bar h2 {
      font-family: 'Playfair Display', serif; font-size: 1.5rem;
      font-weight: 900; color: var(--verde);
    }
    .status-atualizacao {
      font-size: 0.82rem; color: var(--cinza); display: flex; align-items: center; gap: 6px;
    }
    .dot-animado {
      width: 8px; height: 8px; background: #27ae60; border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    /* ===== LISTA DE PEDIDOS ===== */
    #listaPedidos { display: flex; flex-direction: column; gap: 20px; }

    .pedido-card {
      background: var(--card-bg); border-radius: 14px; padding: 24px 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07); border-left: 4px solid var(--verde);
    }
    .pedido-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 16px; flex-wrap: wrap; gap: 8px;
    }
    .pedido-cliente {
      font-weight: 700; font-size: 1.1rem; color: var(--verde);
      display: flex; align-items: center; gap: 8px;
    }
    .pedido-cliente::before { content: "📦"; }
    .pedido-hora { font-size: 0.8rem; color: var(--cinza); }
    .pedido-total-tag {
      font-size: 0.8rem; font-weight: 700; background: var(--verde);
      color: #fff; border-radius: 20px; padding: 3px 12px;
    }

    .marmita-linha {
      display: flex; gap: 10px; padding: 10px 0;
      border-top: 1px solid var(--borda); align-items: flex-start;
    }
    .marmita-badge {
      background: var(--bg); border: 1px solid var(--borda); border-radius: 8px;
      padding: 3px 10px; font-size: 0.8rem; font-weight: 700; color: var(--verde);
      white-space: nowrap; flex-shrink: 0;
    }
    .marmita-itens { font-size: 0.9rem; color: var(--texto); line-height: 1.6; }

    .pedido-vazio {
      text-align: center; color: var(--cinza); padding: 60px 0;
      font-size: 1rem;
    }

    /* ===== LOADING ===== */
    .loading-spinner {
      text-align: center; padding: 60px 0; color: var(--cinza);
    }
    .spinner {
      width: 36px; height: 36px; border: 3px solid var(--borda);
      border-top-color: var(--verde); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== ABAS DE NAVEGAÇÃO ===== */
    .admin-tabs {
      display: flex; gap: 4px; max-width: 860px; margin: 0 auto;
      padding: 0 24px; border-bottom: 1px solid var(--borda);
    }
    .admin-tab {
      background: none; border: none; padding: 14px 18px; cursor: pointer;
      font-family: 'Lato', sans-serif; font-size: 0.95rem; font-weight: 700;
      color: var(--cinza); border-bottom: 3px solid transparent;
      margin-bottom: -1px; transition: color 0.2s, border-color 0.2s;
    }
    .admin-tab:hover { color: var(--verde); }
    .admin-tab.active { color: var(--verde); border-bottom-color: var(--dourado); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ===== RESUMO ===== */
    .resumo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }
    .stat-card {
      background: var(--card-bg); border-radius: 14px; padding: 18px 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    .stat-card.wide { grid-column: 1 / -1; }
    .stat-label { font-size: 0.78rem; color: var(--cinza); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }
    .stat-num { font-size: 2.2rem; font-weight: 900; line-height: 1.1; margin-top: 4px; }
    .stat-num.media { color: var(--verde-claro); }
    .stat-num.grande { color: #8B0000; }
    .stat-num.verde { color: var(--verde); }
    .stat-sub { font-size: 0.82rem; color: var(--cinza); margin-top: 5px; }
    .stat-valor { font-size: 1.8rem; font-weight: 900; color: var(--verde); }
    .barra-prop { height: 12px; border-radius: 7px; background: var(--borda); overflow: hidden; display: flex; margin-top: 12px; }
    .barra-prop i { display: block; height: 100%; }
    .barra-prop .fm { background: var(--verde-claro); }
    .barra-prop .fg { background: #8B0000; }
    .legenda { display: flex; gap: 18px; margin-top: 10px; font-size: 0.85rem; color: var(--cinza); }
    .legenda span { display: flex; align-items: center; gap: 6px; }
    .legenda i { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }

    .prev-card {
      background: linear-gradient(135deg, var(--verde), var(--verde-claro));
      color: #fff; border-radius: 16px; padding: 22px; margin-bottom: 18px;
      box-shadow: 0 6px 20px rgba(26,74,20,0.3);
    }
    .prev-eyebrow { font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; color: var(--dourado); font-weight: 700; }
    .prev-dia { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 900; margin: 4px 0 12px; }
    .prev-nums { display: flex; gap: 24px; flex-wrap: wrap; }
    .prev-n b { display: block; font-size: 1.9rem; font-weight: 900; line-height: 1; }
    .prev-n span { font-size: 0.78rem; opacity: 0.85; }
    .prev-conf { margin-top: 12px; font-size: 0.8rem; opacity: 0.85; }

    table.hist { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
    table.hist th { background: var(--verde); color: #fff; font-size: 0.76rem; padding: 10px 8px; text-transform: uppercase; letter-spacing: 0.3px; }
    table.hist td { padding: 10px 8px; font-size: 0.88rem; text-align: center; border-top: 1px solid var(--borda); }
    table.hist td.dia { text-align: left; font-weight: 700; color: var(--verde); white-space: nowrap; }

    /* ===== CALENDÁRIO DIAS FECHADOS ===== */
    .cal-wrap { background: var(--card-bg); border-radius: 16px; padding: 22px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); max-width: 420px; margin: 0 auto 20px; }
    .cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .cal-mes { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; color: var(--verde); }
    .cal-nav { background: var(--bg); border: 1px solid var(--borda); border-radius: 8px; width: 36px; height: 36px; cursor: pointer; font-size: 1.2rem; color: var(--verde); font-weight: 700; }
    .cal-nav:hover { background: var(--borda); }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-dow { text-align: center; font-size: 0.72rem; font-weight: 700; color: var(--cinza); padding: 6px 0; text-transform: uppercase; }
    .cal-dia {
      aspect-ratio: 1; border: 1px solid var(--borda); border-radius: 10px;
      background: #fff; cursor: pointer; font-family: 'Lato', sans-serif;
      font-size: 0.95rem; font-weight: 700; color: var(--texto);
      display: flex; align-items: center; justify-content: center; transition: all 0.15s;
    }
    .cal-dia:hover:not(.vazio):not(.domingo) { border-color: var(--verde-claro); }
    .cal-dia.vazio { border: none; background: none; cursor: default; }
    .cal-dia.fechado { background: #c0392b; color: #fff; border-color: #c0392b; }
    .cal-dia.hoje { box-shadow: 0 0 0 2px var(--dourado); }
    .cal-dia.domingo { background: #f0e6e6; color: #c99; cursor: default; }
    .cal-dia.passado { opacity: 0.4; }
    .cal-legenda { display: flex; gap: 18px; margin-top: 16px; font-size: 0.82rem; color: var(--cinza); justify-content: center; flex-wrap: wrap; }
    .cal-legenda span { display: flex; align-items: center; gap: 6px; }
    .cal-legenda i { width: 14px; height: 14px; border-radius: 4px; display: inline-block; }
    .cal-hint { text-align: center; font-size: 0.85rem; color: var(--cinza); margin-top: 6px; }
    .lista-fechados { max-width: 420px; margin: 0 auto; }
    .lista-fechados h3 { font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--verde); margin-bottom: 10px; }
    .chip-data { display: inline-flex; align-items: center; gap: 8px; background: #fff; border: 1px solid var(--borda); border-radius: 20px; padding: 6px 8px 6px 14px; font-size: 0.88rem; font-weight: 700; color: var(--texto); margin: 0 8px 8px 0; }
    .chip-data button { background: #c0392b; color: #fff; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-size: 0.9rem; line-height: 1; }

    .carregando-box { text-align: center; padding: 40px; color: var(--cinza); }


  </style>
</head>
<body>

<!-- ===== TELA DE LOGIN ===== -->
<div id="telaLogin">
  <div class="login-box">
    <div class="login-logo">Restaurante do Mário</div>
    <div class="login-sub">PAINEL ADMINISTRATIVO</div>
    <input type="text" id="inputUsuario" placeholder="Usuário" autocomplete="username"
      autocapitalize="off" autocorrect="off" spellcheck="false"
      onkeydown="if(event.key==='Enter') document.getElementById('inputSenha').focus()">
    <input type="password" id="inputSenha" placeholder="Senha" autocomplete="current-password"
      autocapitalize="off" autocorrect="off" spellcheck="false"
      onkeydown="if(event.key==='Enter') fazerLogin()">
    <button class="login-btn" onclick="fazerLogin()">Entrar</button>
    <div class="login-erro" id="loginErro"></div>
  </div>
</div>

<!-- ===== PAINEL ADMIN ===== -->
<div id="telaAdmin">
  <header class="admin-header">
    <div class="admin-header-title">Restaurante do Mário — Admin</div>
    <div class="admin-header-right">
      <span class="badge-total" id="badgeTotal">0 pedidos</span>
      <button class="btn-imprimir" onclick="gerarWord()">Baixar</button>
      <button class="btn-sair" onclick="sair()">Sair</button>
    </div>
  </header>

  <nav class="admin-tabs">
    <button class="admin-tab active" data-tab="pedidos" onclick="trocarTab('pedidos')">Pedidos do Dia</button>
    <button class="admin-tab" data-tab="resumo" onclick="trocarTab('resumo')">Resumo &amp; Histórico</button>
    <button class="admin-tab" data-tab="fechados" onclick="trocarTab('fechados')">Dias Fechados</button>
  </nav>

  <div class="admin-body">
    <!-- ===== ABA: PEDIDOS DO DIA ===== -->
    <div class="tab-panel active" id="tab-pedidos">
      <div class="admin-info-bar">
        <h2>Pedidos do Dia</h2>
        <div class="status-atualizacao">
          <div class="dot-animado"></div>
          <span id="statusAtualizacao">Atualizando em 30s...</span>
        </div>
      </div>

      <div id="listaPedidos">
        <div class="loading-spinner">
          <div class="spinner"></div>
          <div>Carregando pedidos...</div>
        </div>
      </div>
    </div>

    <!-- ===== ABA: RESUMO & HISTÓRICO ===== -->
    <div class="tab-panel" id="tab-resumo">
      <div class="admin-info-bar"><h2>Resumo &amp; Histórico</h2></div>
      <div id="resumoConteudo">
        <div class="carregando-box"><div class="spinner"></div>Carregando resumo…</div>
      </div>
    </div>

    <!-- ===== ABA: DIAS FECHADOS ===== -->
    <div class="tab-panel" id="tab-fechados">
      <div class="admin-info-bar"><h2>Dias Fechados</h2></div>
      <div id="fechadosConteudo">
        <div class="carregando-box"><div class="spinner"></div>Carregando calendário…</div>
      </div>
    </div>
  </div>
</div>

<script>
// ========== CONFIGURAÇÕES ==========
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzk9p47SYi4t9HEotN6FmelyTwf3nuioTsDDbR2TdqvTX7NDldxmev7VxTgQpLS5A1E/exec';

let pedidos = [];
let intervalo = null;
let contagemRegressiva = 30;
let sessionToken = null;

// ========== LOGIN (validado no servidor via Apps Script) ==========
async function fazerLogin() {
  const usuario = document.getElementById('inputUsuario').value.trim().toLowerCase();
  const senha   = document.getElementById('inputSenha').value.trim();
  const erroEl  = document.getElementById('loginErro');
  const btn     = document.querySelector('.login-btn');

  if (!usuario || !senha) {
    erroEl.textContent = 'Preencha usuário e senha.';
    return;
  }

  erroEl.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Entrando...';

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' }, // evita preflight CORS no Apps Script
      body: JSON.stringify({ action: 'login', usuario, senha })
    });
    const data = await res.json();

    if (data.status === 'ok' && data.token) {
      sessionToken = data.token;
      sessionStorage.setItem('rdm_admin_token', sessionToken);
      document.getElementById('telaLogin').style.display = 'none';
      document.getElementById('telaAdmin').style.display = 'block';
      iniciarAdmin();
    } else {
      erroEl.textContent = data.mensagem || 'Usuário ou senha incorretos.';
      document.getElementById('inputSenha').value = '';
      document.getElementById('inputSenha').focus();
    }
  } catch (e) {
    erroEl.textContent = 'Erro ao conectar. Tente novamente.';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
}

function sair() {
  clearInterval(intervalo);
  sessionToken = null;
  sessionStorage.removeItem('rdm_admin_token');
  document.getElementById('telaAdmin').style.display = 'none';
  document.getElementById('telaLogin').style.display = 'flex';
  document.getElementById('inputUsuario').value = '';
  document.getElementById('inputSenha').value = '';
  pedidos = [];
}

// Retoma sessão se já havia um token válido nesta aba
window.addEventListener('DOMContentLoaded', () => {
  const tokenSalvo = sessionStorage.getItem('rdm_admin_token');
  if (tokenSalvo) {
    sessionToken = tokenSalvo;
    document.getElementById('telaLogin').style.display = 'none';
    document.getElementById('telaAdmin').style.display = 'block';
    iniciarAdmin();
  }
});

// ========== BUSCAR PEDIDOS DO GOOGLE SHEETS ==========
async function buscarPedidos() {
  try {
    const res = await fetch(APPS_SCRIPT_URL + '?action=listar&token=' + encodeURIComponent(sessionToken), {
      method: 'GET',
      redirect: 'follow'
    });
    const data = await res.json();

    if (data && data.error === 'unauthorized') {
      // Token expirado ou inválido — volta para a tela de login
      sair();
      document.getElementById('loginErro').textContent = 'Sessão expirada. Entre novamente.';
      return;
    }

    if (data && Array.isArray(data.pedidos)) {
      pedidos = data.pedidos;
      renderizarPedidos();
    }
  } catch (e) {
    console.warn('Erro ao buscar pedidos:', e);
    document.getElementById('listaPedidos').innerHTML =
      `<div class="pedido-vazio">⚠️ Erro ao conectar. Verifique a URL do Apps Script.</div>`;
  }
}

// ========== INICIAR ADMIN ==========
function iniciarAdmin() {
  buscarPedidos();
  contagemRegressiva = 30;
  intervalo = setInterval(() => {
    contagemRegressiva--;
    document.getElementById('statusAtualizacao').textContent =
      `Atualizando em ${contagemRegressiva}s...`;
    if (contagemRegressiva <= 0) {
      contagemRegressiva = 30;
      buscarPedidos();
    }
  }, 1000);
}

// ========== RENDERIZAR PEDIDOS ==========
function renderizarPedidos() {
  const container = document.getElementById('listaPedidos');
  const badge = document.getElementById('badgeTotal');

  if (!pedidos || pedidos.length === 0) {
    badge.textContent = '0 pedidos';
    container.innerHTML = `<div class="pedido-vazio">Nenhum pedido recebido ainda hoje.</div>`;
    return;
  }

  badge.textContent = `${pedidos.length} pedido${pedidos.length !== 1 ? 's' : ''}`;
  container.innerHTML = '';

  pedidos.forEach(pedido => {
    const card = document.createElement('div');
    card.className = 'pedido-card';

    // Agrupar marmitas iguais
    const marmitasAgrupadas = agruparMarmitas(pedido.marmitas);
    const totalMarmitas = pedido.marmitas.reduce((s, m) => s + (m.qty || 1), 0);

    let marmitasHTML = marmitasAgrupadas.map(m => `
      <div class="marmita-linha">
        <div class="marmita-badge">${m.qty > 1 ? m.qty + 'x ' : ''}${m.tipo}</div>
        <div class="marmita-itens">${m.itens}</div>
      </div>
    `).join('');

    card.innerHTML = `
      <div class="pedido-header">
        <div class="pedido-cliente">${pedido.nome}</div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <span class="pedido-hora">${pedido.hora || ''}</span>
          <span class="pedido-total-tag">Total: ${totalMarmitas} marmita${totalMarmitas !== 1 ? 's' : ''}</span>
        </div>
      </div>
      ${marmitasHTML}
    `;
    container.appendChild(card);
  });
}

// ========== AGRUPAR MARMITAS IGUAIS ==========
function agruparMarmitas(marmitas) {
  const grupos = [];
  marmitas.forEach(m => {
    const chave = `${m.tipo}||${m.itens}||${m.tipoPedido}`;
    const existente = grupos.find(g => `${g.tipo}||${g.itens}||${g.tipoPedido}` === chave);
    if (existente) {
      existente.qty += (m.qty || 1);
    } else {
      grupos.push({ tipo: m.tipo, itens: m.itens, qty: m.qty || 1, tipoPedido: m.tipoPedido });
    }
  });
  return grupos;
}

// ========== FORMATAÇÃO DOS ITENS PARA O WORD ==========
function juntarComTraco(str) {
  return str.split(',').map(s => s.trim()).filter(Boolean).join(' - ');
}

function formatarItensPersonalizada(itensStr) {
  let resto = itensStr;
  let obs = '';

  const idxObs = resto.indexOf('⚠️ Obs:');
  if (idxObs !== -1) {
    obs = resto.slice(idxObs + '⚠️ Obs:'.length).trim();
    resto = resto.slice(0, idxObs).trim().replace(/\|\s*$/, '').trim();
  }

  let salada = '';
  const idxSalada = resto.indexOf('Salada:');
  if (idxSalada !== -1) {
    salada = resto.slice(idxSalada + 'Salada:'.length).trim();
    resto = resto.slice(0, idxSalada).trim().replace(/\|\s*$/, '').trim();
  }

  let carnes = '';
  const idxCarnes = resto.indexOf('Carnes:');
  if (idxCarnes !== -1) {
    carnes = resto.slice(idxCarnes + 'Carnes:'.length).trim();
    resto = resto.slice(0, idxCarnes).trim().replace(/\|\s*$/, '').trim();
  }

  const acomp = resto.trim();

  const linhas = [];
  if (salada) linhas.push(juntarComTraco(salada));
  if (acomp) linhas.push(juntarComTraco(acomp));
  if (carnes) {
    carnes.split(',').map(c => c.trim()).filter(Boolean).forEach(c => linhas.push(c));
  }
  if (obs) linhas.push(`Obs: ${obs}`);

  return linhas;
}

function formatarItensMarmita(m) {
  if (m.tipoPedido === 'padrao') {
    const linhas = ['Padrão'];
    const idxObs = m.itens.indexOf('⚠️ Obs:');
    if (idxObs !== -1) {
      const obs = m.itens.slice(idxObs + '⚠️ Obs:'.length).trim();
      if (obs) linhas.push(`Obs: ${obs}`);
    }
    return linhas;
  }
  return formatarItensPersonalizada(m.itens);
}

// ========== GERAR WORD ==========
async function gerarWord() {
  if (!pedidos || pedidos.length === 0) {
    alert('Nenhum pedido para imprimir.');
    return;
  }

  const { Document, Packer, Paragraph, TextRun } = window.docxLib;
  if (!Document) { alert('Biblioteca ainda carregando, tente novamente em alguns segundos.'); return; }

  const children = [];

  pedidos.forEach((pedido, idx) => {
    const totalMarmitas = pedido.marmitas.reduce((s, m) => s + (m.qty || 1), 0);
    const marmitasAgrupadas = agruparMarmitas(pedido.marmitas);

    // Nome do cliente
    children.push(new Paragraph({
      children: [new TextRun({ text: `Nome: ${pedido.nome}`, font: 'Arial', size: 24, bold: true })]
    }));

    // Total de marmitas
    children.push(new Paragraph({
      children: [new TextRun({ text: `Total de Marmitas: ${totalMarmitas}`, font: 'Arial', size: 24 })]
    }));

    // Linha em branco
    children.push(new Paragraph({ children: [new TextRun({ text: '', font: 'Arial', size: 24 })] }));

    // Cada marmita
    marmitasAgrupadas.forEach(m => {
      const tipoLabel = m.qty > 1 ? `${m.qty}x ${m.tipo}` : m.tipo;
      children.push(new Paragraph({
        children: [new TextRun({ text: tipoLabel, font: 'Arial', size: 24, bold: true })]
      }));
      formatarItensMarmita(m).forEach(linha => {
        children.push(new Paragraph({
          children: [new TextRun({ text: linha, font: 'Arial', size: 24 })]
        }));
      });
      children.push(new Paragraph({ children: [new TextRun({ text: '', font: 'Arial', size: 24 })] }));
    });

    // Separador entre pedidos (exceto no último)
    if (idx < pedidos.length - 1) {
      children.push(new Paragraph({
        children: [new TextRun({ text: '________________________________________________', font: 'Arial', size: 24 })]
      }));
      children.push(new Paragraph({ children: [new TextRun({ text: '', font: 'Arial', size: 24 })] }));
    }
  });

  const doc = new Document({
    sections: [{
      properties: {
        page: {
          size: { width: 11906, height: 16838 },
          // 0,5cm em cada margem (1cm ≈ 566.93 twips)
          margin: { top: 283, right: 283, bottom: 283, left: 283 }
        }
      },
      children
    }]
  });

  const buffer = await Packer.toBlob(doc);
  const url = URL.createObjectURL(buffer);
  const a = document.createElement('a');
  const hoje = new Date().toLocaleDateString('pt-BR').replace(/\//g, '-');
  a.href = url;
  a.download = `pedidos-${hoje}.docx`;
  a.click();
  URL.revokeObjectURL(url);
}

// ============================================================
// ABAS DE NAVEGAÇÃO
// ============================================================
let resumoJaCarregado = false;
let fechadosJaCarregado = false;

function trocarTab(tab) {
  document.querySelectorAll('.admin-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + tab));

  if (tab === 'resumo' && !resumoJaCarregado) carregarResumo();
  if (tab === 'fechados' && !fechadosJaCarregado) carregarFechados();
}

// ============================================================
// RESUMO & HISTÓRICO
// ============================================================
function fmtR(v) { return 'R$ ' + (Number(v) || 0).toFixed(2).replace('.', ','); }
function fmtDataBR(iso) { const [a, m, d] = iso.split('-'); return `${d}/${m}`; }

async function carregarResumo() {
  const cont = document.getElementById('resumoConteudo');
  cont.innerHTML = '<div class="carregando-box"><div class="spinner"></div>Carregando resumo…</div>';
  try {
    const url = APPS_SCRIPT_URL + '?action=resumo&token=' + encodeURIComponent(sessionToken);
    const res = await fetch(url, { method: 'GET', redirect: 'follow' });
    const d = await res.json();
    if (d && d.error === 'unauthorized') { sair(); return; }

    resumoJaCarregado = true;
    const h = d.hoje;
    const totMarm = h.total || 0;
    const pctM = totMarm > 0 ? Math.round(h.media / totMarm * 100) : 0;
    const pctG = 100 - pctM;
    const pesarTxt = (h.pesar || 0) > 0 ? ` · ${h.pesar} a pesar` : '';

    const p = d.previsao;
    let prevHtml = `<div class="prev-card">
      <div class="prev-eyebrow">Previsão · próximo dia</div>
      <div class="prev-dia">${p.diaSemana}, ${fmtDataBR(p.data)}</div>`;
    if (p.baseAmostras === 0) {
      prevHtml += `<div style="font-size:0.9rem;opacity:0.9;">Ainda sem dados suficientes de ${p.diaSemana.toLowerCase()}s anteriores para prever.</div>`;
    } else {
      prevHtml += `<div class="prev-nums">
          <div class="prev-n"><b>${p.totalPrevisto}</b><span>marmitas previstas</span></div>
          <div class="prev-n"><b>${p.mediaPrevista}</b><span>médias</span></div>
          <div class="prev-n"><b>${p.grandePrevista}</b><span>grandes</span></div>
          <div class="prev-n"><b>${fmtR(p.valorPrevisto).replace('R$ ','R$')}</b><span>estimado</span></div>
        </div>
        <div class="prev-conf">Baseado em ${p.baseAmostras} ${p.diaSemana.toLowerCase()}${p.baseAmostras>1?'s':''} anterior${p.baseAmostras>1?'es':''} · confiança ${p.confianca}</div>`;
    }
    prevHtml += `</div>`;

    const ant = (d.anteriores || []).slice().reverse();
    let tabela;
    if (ant.length === 0) {
      tabela = '<div class="pedido-vazio">Nenhum dia anterior registrado ainda.</div>';
    } else {
      tabela = `<table class="hist"><thead><tr>
        <th style="text-align:left;">Dia</th><th>Média</th><th>Grande</th><th>Total</th><th>Valor</th>
      </tr></thead><tbody>` +
      ant.map(x => `<tr>
        <td class="dia">${x.diaSemana.slice(0,3)} ${fmtDataBR(x.data)}</td>
        <td>${x.media}</td><td>${x.grande}</td><td><b>${x.total}</b></td><td>${fmtR(x.valor).replace('R$ ','R$')}</td>
      </tr>`).join('') + `</tbody></table>`;
    }

    cont.innerHTML = `
      <div class="stat-card wide">
        <div class="stat-label">Hoje — ${h.diaSemana}, ${fmtDataBR(h.data)} · balcão + site</div>
        <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-top:6px;">
          <div><div class="stat-num verde">${totMarm}</div><div class="stat-sub">marmitas no total${pesarTxt}</div></div>
          <div style="text-align:right;"><div class="stat-valor">${fmtR(h.valor)}</div><div class="stat-sub">em marmitas com preço fixo</div></div>
        </div>
        <div class="barra-prop"><i class="fm" style="width:${pctM}%"></i><i class="fg" style="width:${pctG}%"></i></div>
        <div class="legenda">
          <span><i style="background:var(--verde-claro)"></i>Média: <b>&nbsp;${h.media}</b></span>
          <span><i style="background:#8B0000"></i>Grande: <b>&nbsp;${h.grande}</b></span>
        </div>
      </div>
      <div class="resumo-grid">
        <div class="stat-card"><div class="stat-label">Marmitas Média</div><div class="stat-num media">${h.media}</div></div>
        <div class="stat-card"><div class="stat-label">Marmitas Grande</div><div class="stat-num grande">${h.grande}</div></div>
      </div>
      <div style="margin-top:18px;">${prevHtml}</div>
      <div class="admin-info-bar" style="margin:4px 0 12px;"><h2 style="font-size:1.1rem;">Dias anteriores</h2></div>
      ${tabela}
      <div style="text-align:center;color:var(--cinza);font-size:0.76rem;margin-top:14px;">Conta pedidos do balcão e do site · atualizado ${d.geradoEm}</div>
    `;
  } catch (e) {
    cont.innerHTML = '<div class="pedido-vazio">Não foi possível carregar o resumo. Verifique se as funções foram adicionadas ao Apps Script.</div>';
  }
}

// ============================================================
// DIAS FECHADOS — CALENDÁRIO
// ============================================================
let diasFechados = [];
let calMesAtual = null;

function hojeSP() {
  const p = new Intl.DateTimeFormat('en-CA', { timeZone:'America/Sao_Paulo', year:'numeric', month:'2-digit', day:'2-digit' }).formatToParts(new Date());
  const g = t => p.find(x => x.type===t)?.value ?? '';
  return `${g('year')}-${g('month')}-${g('day')}`;
}

async function carregarFechados() {
  const cont = document.getElementById('fechadosConteudo');
  cont.innerHTML = '<div class="carregando-box"><div class="spinner"></div>Carregando calendário…</div>';
  try {
    const url = APPS_SCRIPT_URL + '?action=diasFechados&token=' + encodeURIComponent(sessionToken);
    const res = await fetch(url, { method:'GET', redirect:'follow' });
    const d = await res.json();
    if (d && d.error === 'unauthorized') { sair(); return; }
    diasFechados = Array.isArray(d.dias) ? d.dias : [];
    fechadosJaCarregado = true;

    if (!calMesAtual) {
      const [a, m] = hojeSP().split('-');
      calMesAtual = new Date(parseInt(a), parseInt(m) - 1, 1);
    }
    renderCalendario();
  } catch (e) {
    cont.innerHTML = '<div class="pedido-vazio">Não foi possível carregar os dias fechados.</div>';
  }
}

function mudarMes(delta) {
  calMesAtual = new Date(calMesAtual.getFullYear(), calMesAtual.getMonth() + delta, 1);
  renderCalendario();
}

function renderCalendario() {
  const cont = document.getElementById('fechadosConteudo');
  const ano = calMesAtual.getFullYear();
  const mes = calMesAtual.getMonth();
  const nomesMes = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const dow = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const hoje = hojeSP();

  const primeiroDiaSemana = new Date(ano, mes, 1).getDay();
  const diasNoMes = new Date(ano, mes + 1, 0).getDate();

  let celulas = '';
  dow.forEach(d => { celulas += `<div class="cal-dow">${d}</div>`; });
  for (let i = 0; i < primeiroDiaSemana; i++) celulas += `<div class="cal-dia vazio"></div>`;

  for (let dia = 1; dia <= diasNoMes; dia++) {
    const iso = `${ano}-${String(mes+1).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;
    const dataObj = new Date(ano, mes, dia);
    const ehDomingo = dataObj.getDay() === 0;
    const ehFechado = diasFechados.includes(iso);
    const ehHoje = iso === hoje;
    const ehPassado = iso < hoje;

    let cls = 'cal-dia';
    if (ehDomingo) cls += ' domingo';
    if (ehFechado) cls += ' fechado';
    if (ehHoje) cls += ' hoje';
    if (ehPassado && !ehFechado) cls += ' passado';

    const onclick = ehDomingo ? '' : ` onclick="toggleDia('${iso}')"`;
    const titulo = ehDomingo ? 'title="Domingo já é fechado"' : '';
    celulas += `<div class="${cls}" ${titulo}${onclick}>${dia}</div>`;
  }

  const futuras = diasFechados.filter(x => x >= hoje).sort();
  let chips = '';
  if (futuras.length > 0) {
    chips = futuras.map(iso => {
      const [a,m,dd] = iso.split('-');
      return `<span class="chip-data">${dd}/${m}/${a}<button onclick="toggleDia('${iso}')" title="Reabrir">✕</button></span>`;
    }).join('');
  } else {
    chips = '<div style="color:var(--cinza);font-size:0.88rem;">Nenhum dia fechado à frente.</div>';
  }

  cont.innerHTML = `
    <div class="cal-wrap">
      <div class="cal-head">
        <button class="cal-nav" onclick="mudarMes(-1)">‹</button>
        <div class="cal-mes">${nomesMes[mes]} ${ano}</div>
        <button class="cal-nav" onclick="mudarMes(1)">›</button>
      </div>
      <div class="cal-grid">${celulas}</div>
      <div class="cal-legenda">
        <span><i style="background:#c0392b"></i>Fechado</span>
        <span><i style="background:#f0e6e6"></i>Domingo</span>
        <span><i style="background:#fff;border:1px solid var(--borda)"></i>Aberto</span>
      </div>
      <div class="cal-hint">Toque num dia para fechar ou reabrir.</div>
    </div>
    <div class="lista-fechados">
      <h3>Próximos dias fechados</h3>
      ${chips}
    </div>
  `;
}

async function toggleDia(iso) {
  const estaFechado = diasFechados.includes(iso);
  const acao = estaFechado ? 'abrirDia' : 'fecharDia';

  if (estaFechado) diasFechados = diasFechados.filter(x => x !== iso);
  else diasFechados = [...diasFechados, iso].sort();
  renderCalendario();

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST', headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: acao, token: sessionToken, data: iso })
    });
    const d = await res.json();
    if (d && d.error === 'unauthorized') { sair(); return; }
    if (d && Array.isArray(d.dias)) { diasFechados = d.dias; renderCalendario(); }
  } catch (e) {
    if (estaFechado) diasFechados = [...diasFechados, iso].sort();
    else diasFechados = diasFechados.filter(x => x !== iso);
    renderCalendario();
    alert('Não foi possível salvar. Verifique a conexão e tente de novo.');
  }
}
